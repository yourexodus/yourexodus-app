<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Exodus Dashboard</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="js/script.js"></script>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>Your Exodus</h2>

        <ul>

            <li class="active">
                <a href="#">
                    <i class="fas fa-house"></i>
                    Dashboard
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fas fa-hands-praying"></i>
                    Prayer Center
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fas fa-book-open"></i>
                    Journal
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fas fa-newspaper"></i>
                    Articles
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fas fa-folder-open"></i>
                    Categories
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fas fa-user"></i>
                    Profile
                </a>
            </li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        <header>

            <h1>Welcome Back!</h1>

            <p>Here your story does not have to end.</p>

        </header>

        <!-- Cards -->

        <section class="cards">

            <div class="card">

                <i class="fas fa-hands-praying fa-2x"></i>

                <h3>Prayer Center</h3>

                <p>12 Active Prayers</p>

                <button onclick="location.href='prayers.html'">
    			Open
		</button>

            </div>

            <div class="card">

                <i class="fas fa-book-open fa-2x"></i>

                <h3>Journal</h3>

                <p>8 Journal Entries</p>

                <button>Open</button>

            </div>

            <div class="card">

                <i class="fas fa-newspaper fa-2x"></i>

                <h3>Articles</h3>

                <p>25 Resources</p>

                <button>Open</button>

            </div>

            <div class="card">

                <i class="fas fa-folder-open fa-2x"></i>

                <h3>Categories</h3>

                <p>6 Categories</p>

                <button>Open</button>

            </div>

        </section>

    </main>

</div>
<script src="js/app.js"></script>
</body>
</html>
